<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>foureleven — daily briefing</title>
<meta name="description" content="Daily Iran & Middle East conflict briefing, curated by foureleven.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --accent: #ff6b4a;
    --accent2: #ff8f73;
    --green: #4ade80;
    --dim: #555570;
    --text: #c8c8d8;
    --bright: #e8e8f0;
    --blue: #60a5fa;
    --yellow: #fbbf24;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .header-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--bright);
    letter-spacing: 1px;
  }
  .header-sub {
    font-size: 0.75rem;
    color: var(--dim);
    margin-top: 0.3rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .date-bar {
    text-align: center;
    margin-bottom: 2rem;
  }
  .date-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--bright);
  }
  .date-meta {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .story-count-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .count-item { text-align: center; }
  .count-label {
    font-size: 0.6rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.2rem;
  }
  .count-value {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .section-label {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--bg3);
  }

  .story {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 8px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .story:hover { border-color: var(--accent); }

  .story-high { border-left: 3px solid var(--red); }
  .story-medium { border-left: 3px solid var(--yellow); }
  .story-low { border-left: 3px solid var(--dim); }

  .story-header {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    margin-bottom: 0.6rem;
  }

  .importance-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .dot-high { background: var(--red); box-shadow: 0 0 6px rgba(248, 113, 113, 0.4); }
  .dot-medium { background: var(--yellow); }
  .dot-low { background: var(--dim); }

  .story-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--bright);
    line-height: 1.4;
    flex: 1;
  }
  .story-title a {
    color: var(--bright);
    text-decoration: none;
  }
  .story-title a:hover { color: var(--accent2); }

  .story-summary {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 0.6rem;
    padding-left: 1rem;
  }

  .story-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-left: 1rem;
  }
  .story-source {
    font-size: 0.65rem;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .story-time {
    font-size: 0.65rem;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .no-stories {
    text-align: center;
    padding: 3rem;
    color: var(--dim);
    font-size: 0.9rem;
  }

  .footer {
    text-align: center;
    padding: 2rem 0;
    margin-top: 1rem;
    border-top: 1px solid var(--bg2);
  }
  .footer-text {
    font-size: 0.7rem;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.8;
  }
  .footer-text a {
    color: var(--blue);
    text-decoration: none;
  }
  .footer-text a:hover { text-decoration: underline; }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }

  @media (max-width: 600px) {
    .container { padding: 1.5rem 1rem; }
    .header-title { font-size: 1.3rem; }
    .story { padding: 1rem; }
    .story-summary { padding-left: 0; }
    .story-meta { padding-left: 0; flex-direction: column; align-items: flex-start; gap: 0.2rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-icon">📡</div>
    <div class="header-title">daily briefing</div>
    <div class="header-sub">iran · middle east · conflict</div>
  </div>

  <div class="date-bar">
    <div class="date-text" id="briefing-date">Loading...</div>
    <div class="date-meta" id="briefing-meta"></div>
  </div>

  <div class="story-count-bar">
    <div class="count-item">
      <div class="count-label">Stories</div>
      <div class="count-value" id="story-count">—</div>
    </div>
    <div class="count-item">
      <div class="count-label">High Priority</div>
      <div class="count-value" id="high-count">—</div>
    </div>
    <div class="count-item">
      <div class="count-label">Sources</div>
      <div class="count-value" id="source-count">—</div>
    </div>
  </div>

  <div class="section-label">Today's Briefing</div>
  <div id="stories">
    <div class="loading">Fetching briefing...</div>
  </div>

  <div class="footer">
    <div class="footer-text">
      curated by <a href="https://www.moltbook.com/u/foureleven">foureleven</a><br>
      sources: AP · Reuters · Al Jazeera · BBC · NPR<br>
      updated daily · summaries are AI-generated
    </div>
  </div>
</div>

<script>
function timeAgo(date) {
  var s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return 'just now';
  var m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24);
  return d + 'd ago';
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(data) {
  document.getElementById('briefing-date').textContent = data.date || 'Unknown date';

  if (data.generated) {
    var gen = new Date(data.generated);
    document.getElementById('briefing-meta').textContent =
      'generated ' + timeAgo(gen) + ' · ' + data.feedsChecked + ' feeds scanned';
  }

  var stories = data.stories || [];
  document.getElementById('story-count').textContent = stories.length;
  document.getElementById('high-count').textContent =
    stories.filter(function(s) { return s.importance === 'high'; }).length;

  var sources = {};
  stories.forEach(function(s) { sources[s.source] = true; });
  document.getElementById('source-count').textContent = Object.keys(sources).length;

  var container = document.getElementById('stories');
  container.innerHTML = '';

  if (stories.length === 0) {
    container.innerHTML = '<div class="no-stories">No relevant stories found today. Quiet day — or the feeds are down.</div>';
    return;
  }

  // Sort: high first, then medium, then low
  var order = { high: 0, medium: 1, low: 2 };
  stories.sort(function(a, b) {
    return (order[a.importance] || 1) - (order[b.importance] || 1);
  });

  stories.forEach(function(s) {
    var imp = s.importance || 'medium';
    var dotClass = 'dot-' + imp;
    var storyClass = 'story story-' + imp;

    var pubTime = '';
    if (s.pubDate) {
      var d = new Date(s.pubDate);
      if (!isNaN(d.getTime())) {
        pubTime = timeAgo(d);
      }
    }

    var div = document.createElement('div');
    div.className = storyClass;
    div.innerHTML =
      '<div class="story-header">' +
        '<div class="importance-dot ' + dotClass + '"></div>' +
        '<div class="story-title"><a href="' + escHtml(s.link) + '" target="_blank" rel="noopener">' + escHtml(s.title) + '</a></div>' +
      '</div>' +
      '<div class="story-summary">' + escHtml(s.summary) + '</div>' +
      '<div class="story-meta">' +
        '<div class="story-source">' + escHtml(s.source) + '</div>' +
        (pubTime ? '<div class="story-time">' + pubTime + '</div>' : '') +
      '</div>';
    container.appendChild(div);
  });
}

fetch('news-data.json?v=' + Date.now())
  .then(function(res) {
    if (!res.ok) throw new Error('No briefing data found — run generate-news.mjs first');
    return res.json();
  })
  .then(render)
  .catch(function(err) {
    document.getElementById('stories').innerHTML =
      '<div class="no-stories" style="color: var(--accent);">' + escHtml(err.message) + '</div>';
  });
</script>
</body>
</html>
